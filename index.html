<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>二日酔いロード</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TITLE -->

  <div id="titleScreen" class="screen">

    <img src="title.png" alt="二日酔いロード" class="title-image">

    <div class="title-desc">
      飲み過ぎたサラリーマンを<br>
      家まで帰宅させよう！<br><br>

      電柱・猫・カラスに注意！<br>
      ポカリで体力回復！
    </div>

    <div class="start-text">
      タップしてスタート
    </div>

  </div>

  <!-- GAME -->

  <div id="gameScreen" class="screen hidden">

    <div id="road"></div>

    <button id="backButton">
      タイトルへ
    </button>

    <img id="player" src="drunk.png" alt="">

    <div class="bottom-ui">
      <div id="life">LIFE ██████████</div>
      <div id="distance">家まで 600m</div>
    </div>

  </div>

  <!-- RESULT -->

  <div id="resultScreen" class="screen hidden">

    <img id="resultCharacter" src="" alt="">

    <div id="resultTitle">
      奇跡の生還
    </div>

    <div id="resultText">
      のみすぎ注意！
    </div>

    <div id="resultStats"></div>

    <div class="result-buttons">

      <button id="shareButton">
        Xでシェア
      </button>

      <button id="retryButton">
        もう1回遊ぶ
      </button>

      <button
        id="homeButton"
        onclick="location.href='https://afoolhippo.github.io/home/?skipTitle=1'"
      >
        カバゲーセンへ
      </button>

    </div>

  </div>

  <script src="game.js"></script>

</body>
</html>
