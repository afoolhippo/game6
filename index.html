<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>二日酔いロード</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="titleScreen" class="screen">
    <img src="title.png" alt="二日酔いロード" class="title-image">
    <div class="start-text">PRESS START BUTTON</div>
  </div>

  <div id="ruleScreen" class="screen hidden">
    <h2>HOW TO PLAY</h2>

    <div class="rule-main">
      <p class="rule-catch">駅までたどりつけ！</p>

      <p>
        電柱、猫、カラス、ゴミ箱をよけながら<br>
        よるのみちをあるこう。
      </p>

      <p>
        ポカリでライフ回復！
      </p>

      <p class="rule-time">
        プレイ時間：約1分
      </p>
    </div>

    <div class="rule-icons">
      <div>
        <img src="pole.png" alt="">
        <span>電柱</span>
      </div>
      <div>
        <img src="cat.png" alt="">
        <span>猫</span>
      </div>
      <div>
        <img src="crow.png" alt="">
        <span>カラス</span>
      </div>
      <div>
        <img src="trash.png" alt="">
        <span>ゴミ箱</span>
      </div>
      <div>
        <img src="pocari.png" alt="">
        <span>ポカリ</span>
      </div>
    </div>

    <div class="start-text">TAP TO START</div>
  </div>

  <div id="gameScreen" class="screen hidden">
    <div id="road"></div>

    <img id="player" src="drunk.png" alt="">

    <div class="bottom-ui">
      <div id="life">LIFE ██████████</div>
      <div id="distance">駅まで 600m</div>
    </div>
  </div>

  <div id="resultScreen" class="screen hidden">
    <div id="resultTitle">無事生還！</div>
    <div id="resultText">駅まで帰れた…</div>

    <button id="retryButton">もういっかい！</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
